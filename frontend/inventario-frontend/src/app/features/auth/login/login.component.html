<div class="login-container">
  <form (ngSubmit)="login()" class="login-card">
    <h2>Iniciar sesión</h2>

    <input 
      type="text" 
      placeholder="Usuario" 
      [(ngModel)]="username" 
      name="username"
      required
    >

    <input 
      type="password" 
      placeholder="Contraseña" 
      [(ngModel)]="password" 
      name="password"
      required
    >

    <button type="submit">Ingresar</button>
  </form>
</div>
